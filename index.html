<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCSS Layout</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class="page">

<div class="layout">

    <header class="header">
        <h1 class="header__title">My Website</h1>
    </header>

    <nav class="nav">
        <ul class="nav__list">
            <li class="nav__item">Home</li>
            <li class="nav__item">About</li>
            <li class="nav__item">Projects</li>
            <li class="nav__item">Contact</li>
        </ul>
    </nav>

    <main class="main">
        <section class="card">
            <h2 class="card__title">Welcome</h2>
            <p class="card__text">
                This layout uses CSS Grid, Flexbox, SCSS, and BEM.
            </p>
        </section>
    </main>

    <aside class="sidebar">
        Sidebar
    </aside>

    <footer class="footer">
        <p class="footer__text">
            © 2026 Tanner Phillips
        </p>
    </footer>

</div>

</body>
</html>
